<!--LOGIN PAGE -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nook - Login</title>
    <link rel="stylesheet" href="/css/style.css">
    <script type="module" src="/js/login.js"></script>
</head>
<body>
    <header id="main-header"></header>

    <main class="auth-container">
        <section class="content-card auth-card">
            <h2 id="auth-title">Login to Nook</h2>
            <form id="auth-form">
                <div class="form-group">
                    <label for="auth-email">Email Address</label>
                    <input type="email" id="auth-email" required placeholder="name@example.com">
                </div>
                <div class="form-group">
                    <label for="auth-password">Password</label>
                    <input type="password" id="auth-password" required placeholder="••••••••" minlength="6">
                </div>
                <button type="submit" id="auth-submit-btn" class="btn-primary">Sign In</button>
            </form>
            <p class="auth-toggle-text">
                Don't have an account? <a href="#" id="toggle-auth-view">Register here</a>
            </p>
        </section>
    </main>

    <footer id="main-footer"></footer>
</body>
</html>
